<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070d0f;color:#475569;font-family:sans-serif;font-size:16px;flex-direction:column;gap:12px"><div style="font-size:40px">🏸</div><div>Loading Badminton Club TCI...</div></div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;

// ─────────────────────────────────────────────────────────────────────────────
//  🔥 FIREBASE CONFIG  ← Paste your own values here after setup
// ─────────────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "PASTE_YOUR_apiKey_HERE",
  authDomain:        "PASTE_YOUR_authDomain_HERE",
  databaseURL:       "PASTE_YOUR_databaseURL_HERE",
  projectId:         "PASTE_YOUR_projectId_HERE",
  storageBucket:     "PASTE_YOUR_storageBucket_HERE",
  messagingSenderId: "PASTE_YOUR_messagingSenderId_HERE",
  appId:             "PASTE_YOUR_appId_HERE",
};
const DB_PATH = "badminton";
const CONFIGURED = !FIREBASE_CONFIG.apiKey.includes("PASTE");

// ─── Firebase loader ─────────────────────────────────────────────────────────
let _fb = null;
async function getFb() {
  if (_fb) return _fb;
  if (!CONFIGURED) return null;
  try {
    const firebaseApp = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const firebaseDb  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const { initializeApp, getApps } = firebaseApp;
    const { getDatabase, ref, set, onValue, off } = firebaseDb;
    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    const db  = getDatabase(app);
    _fb = { db, ref, set, onValue, off };
    return _fb;
  } catch(e) { console.error("Firebase init failed:", e); return null; }
}

async function fbWrite(data) {
  const fb = await getFb();
  if (!fb) return;
  try { await fb.set(fb.ref(fb.db, DB_PATH), JSON.parse(JSON.stringify(data))); }
  catch(e) { console.error("fbWrite error:", e); }
}

function fbListen(onChange) {
  if (!CONFIGURED) return () => {};
  let dbRef = null;
  getFb().then(fb => {
    if (!fb) return;
    dbRef = fb.ref(fb.db, DB_PATH);
    fb.onValue(dbRef, snap => { if (snap.exists()) onChange(snap.val()); });
  });
  return () => { if (dbRef && _fb) { try { _fb.off(dbRef); } catch {} } };
}

// ─── Constants ────────────────────────────────────────────────────────────────
const TIMER_OPTIONS = [15, 20, 30];
const SKILL_LEVELS  = ["Beginner", "Intermediate", "Advanced"];
const SESSION_TYPES = ["Friendly", "Open", "Tournament"];
const SKILL_COLOR   = { Beginner: "#4ade80", Intermediate: "#facc15", Advanced: "#f87171" };
const SKILL_SHORT   = { Beginner: "BEG", Intermediate: "INT", Advanced: "ADV" };

const uid = () => Math.random().toString(36).substr(2,8);
const now = () => Date.now();
// elapsed minutes accounting for paused duration and current pause
const matchMins = m => {
  if (!m) return 0;
  const paused = (m.pausedDuration || 0) + (m.pausedAt ? now() - m.pausedAt : 0);
  return Math.floor((now() - m.startTime - paused) / 60000);
};
const matchSecs = m => {
  if (!m) return 0;
  const paused = (m.pausedDuration || 0) + (m.pausedAt ? now() - m.pausedAt : 0);
  return Math.floor((now() - m.startTime - paused) / 1000);
};
const mins = ts => Math.floor((now() - ts) / 60000);
const fmt = ts => new Date(ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
const fmtDate = ts => new Date(ts).toLocaleDateString([], { month:"short", day:"numeric" });
const fmtElapsed = secs => { const m = Math.floor(secs/60); const s = secs%60; return `${m}:${String(s).padStart(2,"0")}`; };

function timeAgo(ts) {
  const d = mins(ts);
  if (d < 1) return "just now";
  if (d < 60) return `${d}m ago`;
  return `${Math.floor(d/60)}h ${d%60}m ago`;
}

// ─── Initial state ────────────────────────────────────────────────────────────
const INIT = {
  players: [],          // { id, name, skill, checkedIn, checkInTime, gamesPlayed, wins, losses, hasPaid, amountPaid, sitOutGames }
  courts: [
    { id:1, name:"Court 1", match:null },
    { id:2, name:"Court 2", match:null },
  ],
  queue: [],            // [{ id, teamA:[pid,pid], teamB:[pid,pid], startTime, sessionType }]
  matches: [],          // completed matches
  session: { type:"Friendly", active: false, startTime: null },
  tournament: null,     // bracket data
  tournamentTeams: [],  // { id, name, leaderId, memberIds, color, wins, losses, registered }
  settings: { gameDuration: 15, sessionFee: 5, adminPin: "1234" },
};

// ─── Team colors ─────────────────────────────────────────────────────────────
const TEAM_COLORS = ["#f87171","#fb923c","#facc15","#4ade80","#34d399","#38bdf8","#818cf8","#e879f9","#f472b6","#a78bfa"];

// ─── Bracket generator (team-based) ──────────────────────────────────────────
function buildTeamBracket(teams) {
  // shuffle for random seeding
  const shuffled = [...teams].sort(() => Math.random() - 0.5);
  const rounds = [];
  let current = shuffled.map(t => ({ id: t.id, name: t.name, color: t.color }));
  while (current.length > 1) {
    const round = [];
    for (let i = 0; i < current.length - 1; i += 2) {
      round.push({ id: uid(), teamA: current[i], teamB: current[i+1], winner: null, scoreA:"", scoreB:"" });
    }
    if (current.length % 2 !== 0) {
      round.push({ id: uid(), teamA: current[current.length-1], teamB: null, winner: current[current.length-1], scoreA:"BYE", scoreB:"" });
    }
    rounds.push(round);
    current = round.map(m => m.winner).filter(Boolean);
    if (current.length <= 1) break;
  }
  return { rounds, champion: null };
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [state, setState]     = useState(INIT);
  const [view, setView]       = useState("checkin"); // checkin|dashboard|players|courts|tournament|leaderboard|setup|admin
  const [tick, setTick]       = useState(0);
  const [toast, setToast]     = useState(null);
  const [modal, setModal]     = useState(null); // { type, data }
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [adminPinInput, setAdminPinInput] = useState("");

  // Dynamic game duration from settings
  const GAME_DURATION = (state.settings && state.settings.gameDuration) || 15;

  const [syncStatus, setSyncStatus] = useState("idle");
  const writeTimer = useRef(null);
  const isRemote   = useRef(false);

  // On mount: load localStorage first, then connect Firebase live listener
  useEffect(() => {
    try { const raw = localStorage.getItem("bm2"); if (raw) setState(JSON.parse(raw)); } catch {}
    if (!CONFIGURED) { setSyncStatus("unconfigured"); return; }
    const unsub = fbListen(cloudData => {
      isRemote.current = true;
      setState(cloudData);
      try { localStorage.setItem("bm2", JSON.stringify(cloudData)); } catch {}
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus("idle"), 2000);
    });
    return unsub;
  }, []);

  // Save to Firebase debounced + always mirror to localStorage
  useEffect(() => {
    if (isRemote.current) { isRemote.current = false; return; }
    try { localStorage.setItem("bm2", JSON.stringify(state)); } catch {}
    if (!CONFIGURED) return;
    setSyncStatus("syncing");
    clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(async () => {
      try { await fbWrite(state); setSyncStatus("saved"); setTimeout(() => setSyncStatus("idle"), 2000); }
      catch { setSyncStatus("offline"); }
    }, 800);
  }, [state]);

  useEffect(() => { const t = setInterval(() => setTick(x=>x+1), 1000); return ()=>clearInterval(t); }, []);

  const update = fn => setState(s => { const ns = structuredClone(s); fn(ns); return ns; });

  let toastTimer;
  const toast$ = (msg, type="ok") => {
    setToast({msg,type}); clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>setToast(null), 2800);
  };

  // ── Player actions ──────────────────────────────────────────────────────────
  const addPlayer = (name, skill) => {
    if (!name.trim()) { toast$("Enter a name","err"); return; }
    update(s => s.players.push({ id:uid(), name:name.trim(), skill, checkedIn:true,
      checkInTime:now(), gamesPlayed:0, wins:0, losses:0,
      hasPaid:false, amountPaid:0, sitOutGames:0 }));
    toast$(`✓ ${name.trim()} checked in`);
  };

  const toggleCheckIn = id => update(s => {
    const p = s.players.find(x=>x.id===id);
    p.checkedIn = !p.checkedIn;
    if (p.checkedIn) p.checkInTime = now();
  });

  const removePlayer = id => update(s => { s.players = s.players.filter(x=>x.id!==id); });

  const togglePayment = (id, amount) => update(s => {
    const p = s.players.find(x=>x.id===id);
    if (!p) return;
    p.hasPaid = !p.hasPaid;
    p.amountPaid = p.hasPaid ? (amount || s.settings.sessionFee || 5) : 0;
  });

  // ── Court / match actions ───────────────────────────────────────────────────
  const startMatch = (courtId, teamA, teamB, sessionType, duration) => {
    update(s => {
      const c = s.courts.find(x=>x.id===courtId);
      const dur = duration || (s.settings && s.settings.gameDuration) || 15;
      c.match = { id:uid(), teamA, teamB, startTime:now(), sessionType, duration: dur,
        status:"playing", pausedAt:null, pausedDuration:0, liveScoreA:0, liveScoreB:0 };
    });
  };

  const pauseMatch = courtId => {
    update(s => {
      const m = s.courts.find(x=>x.id===courtId)?.match;
      if (!m || m.pausedAt) return;
      m.pausedAt = now();
      m.status = "paused";
    });
    toast$("⏸ Match paused");
  };

  const resumeMatch = courtId => {
    update(s => {
      const m = s.courts.find(x=>x.id===courtId)?.match;
      if (!m || !m.pausedAt) return;
      m.pausedDuration = (m.pausedDuration || 0) + (now() - m.pausedAt);
      m.pausedAt = null;
      m.status = "playing";
    });
    toast$("▶ Match resumed");
  };


  const updateLiveScore = (courtId, side, delta) => {
    update(s => {
      const m = s.courts.find(x=>x.id===courtId)?.match;
      if (!m) return;
      if (side === "A") m.liveScoreA = Math.max(0, (m.liveScoreA||0) + delta);
      if (side === "B") m.liveScoreB = Math.max(0, (m.liveScoreB||0) + delta);
    });
  };

  const resetLiveScore = (courtId) => {
    update(s => {
      const m = s.courts.find(x=>x.id===courtId)?.match;
      if (!m) return;
      m.liveScoreA = 0; m.liveScoreB = 0;
    });
  };

  const endMatch = (courtId, winnerSide, scoreA, scoreB) => {
    update(s => {
      const c = s.courts.find(x=>x.id===courtId);
      if (!c.match) return;
      const m = c.match;
      // if paused, resume first to capture final duration
      if (m.pausedAt) { m.pausedDuration = (m.pausedDuration||0) + (now()-m.pausedAt); m.pausedAt=null; }
      const winner = winnerSide === "A" ? m.teamA : m.teamB;
      const loser  = winnerSide === "A" ? m.teamB : m.teamA;
      const playedMins = matchMins(m);
      [...m.teamA, ...m.teamB].forEach(pid => {
        const p = s.players.find(x=>x.id===pid);
        if (!p) return;
        p.gamesPlayed++;
        if (winner.includes(pid)) p.wins++;
        else p.losses++;
      });
      s.matches.push({ ...m, winner, loser, scoreA, scoreB, endTime:now(), playedMins });
      c.match = null;
      // Decrement sitOutGames for all players NOT in this match
      const playingIds = [...m.teamA, ...m.teamB];
      s.players.forEach(p => {
        if (!playingIds.includes(p.id) && p.sitOutGames > 0) p.sitOutGames--;
      });
      if (s.queue.length > 0) {
        const next = s.queue.shift();
        c.match = { id:uid(), ...next, startTime:now(), status:"playing", pausedAt:null, pausedDuration:0, liveScoreA:0, liveScoreB:0 };
      }
    });
    toast$("✓ Match recorded");
  };


  const skipQueueTurn = (queueIdx) => {
    update(s => {
      if (queueIdx < 0 || queueIdx >= s.queue.length) return;
      const entry = s.queue.splice(queueIdx, 1)[0];
      entry.skipped = (entry.skipped || 0) + 1;
      s.queue.push(entry);
      // Penalty: all players in skipped match sit out 1 extra game
      const penaltyIds = [...(entry.teamA||[]), ...(entry.teamB||[])];
      penaltyIds.forEach(pid => {
        const p = s.players.find(x=>x.id===pid);
        if (p) p.sitOutGames = Math.max(p.sitOutGames||0, 1);
      });
    });
    toast$("↩ Skipped — moved to back · 1 game sit-out penalty applied");
  };

  const playerSelfJoinQueue = (playerId) => {
    // Add solo player to queue as a "waiting" entry to be paired by admin
    update(s => {
      const alreadyQueued = s.queue.some(q => q.playerIds && q.playerIds.includes(playerId));
      if (alreadyQueued) return;
      s.queue.push({ id: uid(), playerIds: [playerId], solo: true, joinedAt: now(), skipped: 0 });
    });
    toast$("✓ You joined the queue!");
  };

  const playerLeaveQueue = (playerId) => {
    update(s => {
      s.queue = s.queue.filter(q => !(q.playerIds && q.playerIds.includes(playerId)));
    });
    toast$("Removed from queue");
  };

  const queueMatch = (teamA, teamB, sessionType) => {
    update(s => s.queue.push({ teamA, teamB, sessionType }));
    toast$("Added to queue");
  };

  // ── Tournament ──────────────────────────────────────────────────────────────
  const startTournament = () => {
    const registered = state.tournamentTeams.filter(t=>t.registered);
    if (registered.length < 2) { toast$("Need at least 2 registered teams","err"); return; }
    const bracket = buildTeamBracket(registered);
    update(s => { s.tournament = bracket; s.session.type = "Tournament"; s.session.active = true; s.session.startTime = now(); });
    setView("tournament");
    toast$("🏆 Tournament bracket created!");
  };

  const recordTournamentResult = (roundIdx, matchIdx, winnerSide, sA, sB) => {
    update(s => {
      if (!s.tournament) return;
      const match = s.tournament.rounds[roundIdx][matchIdx];
      if (match.winner) return; // already decided
      match.winner = winnerSide === "A" ? match.teamA : match.teamB;
      if (sA !== undefined) { match.scoreA = sA; match.scoreB = sB; }
      // update team win/loss
      const winTeam = s.tournamentTeams.find(t=>t.id===match.winner.id);
      const loseTeam = s.tournamentTeams.find(t=>t.id===(winnerSide==="A"?match.teamB?.id:match.teamA?.id));
      if (winTeam)  winTeam.wins  = (winTeam.wins||0)+1;
      if (loseTeam) loseTeam.losses = (loseTeam.losses||0)+1;
      // advance winner to next round
      const allDecided = s.tournament.rounds[roundIdx].every(m=>m.winner);
      if (allDecided) {
        const winners = s.tournament.rounds[roundIdx].map(m=>m.winner).filter(Boolean);
        if (winners.length === 1) {
          s.tournament.champion = winners[0];
        } else {
          const newMatches = [];
          for (let i = 0; i < winners.length - 1; i += 2) {
            newMatches.push({ id:uid(), teamA:winners[i], teamB:winners[i+1], winner:null, scoreA:"", scoreB:"" });
          }
          if (winners.length % 2 !== 0) {
            newMatches.push({ id:uid(), teamA:winners[winners.length-1], teamB:null, winner:winners[winners.length-1], scoreA:"BYE", scoreB:"" });
          }
          if (newMatches.length > 0 && !s.tournament.rounds[roundIdx+1]) {
            s.tournament.rounds.push(newMatches);
          }
        }
      } else {
        // slot winner into next round if it exists
        if (s.tournament.rounds[roundIdx+1]) {
          const slot = Math.floor(matchIdx/2);
          const nr = s.tournament.rounds[roundIdx+1];
          if (nr[slot]) {
            if (matchIdx%2===0) nr[slot].teamA = match.winner;
            else nr[slot].teamB = match.winner;
          }
        }
      }
    });
  };

  // ── Tournament team actions ─────────────────────────────────────────────────
  const addTournamentTeam = (name, leaderId, color) => {
    if (!name.trim()) { toast$("Enter a team name","err"); return; }
    update(s => s.tournamentTeams.push({
      id:uid(), name:name.trim(), leaderId, memberIds:leaderId?[leaderId]:[],
      color: color||TEAM_COLORS[s.tournamentTeams.length % TEAM_COLORS.length],
      wins:0, losses:0, registered:false, createdAt:now()
    }));
    toast$(`✓ Team "${name.trim()}" created`);
  };

  const removeTournamentTeam = id => update(s => { s.tournamentTeams = s.tournamentTeams.filter(t=>t.id!==id); });

  const toggleTeamMember = (teamId, playerId) => update(s => {
    const t = s.tournamentTeams.find(x=>x.id===teamId);
    if (!t) return;
    if (t.memberIds.includes(playerId)) t.memberIds = t.memberIds.filter(x=>x!==playerId);
    else t.memberIds.push(playerId);
  });

  const toggleTeamRegistered = id => update(s => {
    const t = s.tournamentTeams.find(x=>x.id===id);
    if (t) t.registered = !t.registered;
  });

  const setTeamLeader = (teamId, playerId) => update(s => {
    const t = s.tournamentTeams.find(x=>x.id===teamId);
    if (t) { t.leaderId = playerId; if (!t.memberIds.includes(playerId)) t.memberIds.push(playerId); }
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────
  const playerById = id => state.players.find(p=>p.id===id);
  const checkedIn  = state.players.filter(p=>p.checkedIn);
  const activeCourts = state.courts.filter(c=>c.match).length;

  const roundLabel = (rounds, idx) => {
    const total = rounds.length;
    if (idx === total-1) return "Final";
    if (idx === total-2) return "Semi-Final";
    if (idx === total-3) return "Quarter-Final";
    return `Round ${idx+1}`;
  };

  // ─── VIEWS ──────────────────────────────────────────────────────────────────

  // ── DASHBOARD ───────────────────────────────────────────────────────────────
  const ViewDashboard = () => (
    <div className="view">
      <div className="dash-grid">
        {/* Stats row */}
        <div className="stat-row">
          {[
            { n: state.players.length,  l:"Players",   c:"#1aff7a" },
            { n: checkedIn.length,      l:"Checked In", c:"#38bdf8" },
            { n: activeCourts,          l:"On Court",   c:"#facc15" },
            { n: state.matches.length,  l:"Matches",    c:"#f472b6" },
          ].map(s=>(
            <div key={s.l} className="stat-card">
              <div className="stat-big" style={{color:s.c}}>{s.n}</div>
              <div className="stat-lbl">{s.l}</div>
            </div>
          ))}
        </div>

        {/* Session type */}
        <div className="card">
          <div className="card-title">Session Type</div>
          <div className="pill-row">
            {SESSION_TYPES.map(t=>(
              <button key={t}
                className={`pill ${state.session.type===t?"pill-active":""}`}
                onClick={()=>update(s=>{ s.session.type=t; })}>
                {t==="Friendly"?"🏸":t==="Open"?"🔓":"🏆"} {t}
              </button>
            ))}
          </div>
          {state.session.type === "Tournament" && (
            <button className="btn-green mt10" onClick={startTournament}>
              Generate Bracket →
            </button>
          )}
        </div>

        {/* Courts quick view */}
        <div className="card">
          <div className="card-title">Courts</div>
          {state.courts.map(court=>{
            const m = court.match;
            const s = m ? (m.status==="paused"?"paused":matchMins(m)>=GAME_DURATION?"overtime":"playing") : "open";
            const col = {open:"#1aff7a",playing:"#facc15",overtime:"#f87171",paused:"#a78bfa"}[s];
            const elapsed = m ? mins(m.startTime) : 0;
            return (
              <div key={court.id} className="court-mini" style={{borderColor:col+"44",background:col+"08"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="court-mini-name" style={{color:col}}>{court.name}</span>
                  <span className="badge" style={{background:col,color:"#050d0a"}}>
                    {s.toUpperCase()}
                  </span>
                </div>
                {m ? (
                  <div className="court-mini-teams">
                    <span>{m.teamA.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                    <span className="vs">vs</span>
                    <span>{m.teamB.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                    <span className="court-timer" style={{color:s==="overtime"?"#f87171":s==="paused"?"#a78bfa":"#94a3b8"}}>
                      {s==="overtime"?`+${matchMins(m)-GAME_DURATION}m`:s==="paused"?"PAUSED":`${Math.max(0,GAME_DURATION-matchMins(m))}m`}
                    </span>
                  </div>
                ):(
                  <div style={{fontSize:12,color:"#3a6a4a",marginTop:4}}>No active match</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Queue */}
        {state.queue.length > 0 && (
          <div className="card">
            <div className="card-title">Queue ({state.queue.length})</div>
            {state.queue.map((q,i)=>(
              <div key={i} className="queue-mini">
                <span className="q-num-sm">{i+1}</span>
                <span>{q.teamA.map(id=>playerById(id)?.name||"?").join("&")} vs {q.teamB.map(id=>playerById(id)?.name||"?").join("&")}</span>
              </div>
            ))}
          </div>
        )}

        {/* Recent matches */}
        {state.matches.length > 0 && (
          <div className="card">
            <div className="card-title">Recent Matches</div>
            {[...state.matches].reverse().slice(0,4).map(m=>(
              <div key={m.id} className="match-mini">
                <div className="match-teams">
                  <span className="winner-team">{m.winner.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                  <span className="match-score">{m.scoreA} – {m.scoreB}</span>
                  <span className="loser-team">{m.loser.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                </div>
                <div className="match-meta">{fmt(m.startTime)} · {m.sessionType}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  // ── PLAYERS ──────────────────────────────────────────────────────────────────
  const ViewPlayers = () => {
    const [name,  setName]  = useState("");
    const [skill, setSkill] = useState("Intermediate");
    return (
      <div className="view">
        {/* Add player form */}
        <div className="card">
          <div className="card-title">Register Player</div>
          <input className="txt-input" placeholder="Player name"
            value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"){ addPlayer(name,skill); setName(""); }}}/>
          <div className="pill-row mt8">
            {SKILL_LEVELS.map(sl=>(
              <button key={sl}
                className={`pill ${skill===sl?"pill-active":""}`}
                style={skill===sl?{background:SKILL_COLOR[sl],color:"#050d0a",borderColor:SKILL_COLOR[sl]}:{borderColor:SKILL_COLOR[sl]+"44",color:SKILL_COLOR[sl]}}
                onClick={()=>setSkill(sl)}>{sl}
              </button>
            ))}
          </div>
          <button className="btn-green mt10"
            onClick={()=>{ addPlayer(name,skill); setName(""); }}>
            + Check In Player
          </button>
        </div>

        {/* Player list */}
        <div className="card">
          <div className="card-title">Players ({state.players.length})</div>
          {state.players.length === 0 && <div className="empty-hint">No players yet</div>}
          {state.players.map(p=>(
            <div key={p.id} className={`player-row-full ${!p.checkedIn?"p-absent":""}`}>
              <div className="p-avatar" style={{background:SKILL_COLOR[p.skill]+"22",borderColor:SKILL_COLOR[p.skill]+"55",color:SKILL_COLOR[p.skill]}}>
                {p.name[0].toUpperCase()}
              </div>
              <div className="p-info">
                <div className="p-name">{p.name}</div>
                <div className="p-meta">
                  <span className="skill-tag" style={{color:SKILL_COLOR[p.skill]}}>{SKILL_SHORT[p.skill]}</span>
                  {p.checkedIn
                    ? <span className="checkin-time">✓ {fmt(p.checkInTime)}</span>
                    : <span style={{color:"#f87171",fontSize:11}}>Checked out</span>}
                  <span style={{color:"#64748b",fontSize:11}}>🏸 {p.gamesPlayed}G · {p.wins}W · {p.losses}L</span>
                  <span style={{fontSize:11,color:p.hasPaid?"#1aff7a":"#f87171",fontWeight:700}}>{p.hasPaid?"✓ Paid":"Unpaid"}</span>
                  {p.sitOutGames>0 && <span style={{fontSize:11,color:"#facc15"}}>⚠ Sitting out {p.sitOutGames}g</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="icon-btn" style={{color:p.checkedIn?"#facc15":"#1aff7a"}}
                  onClick={()=>toggleCheckIn(p.id)} title={p.checkedIn?"Check out":"Check in"}>
                  {p.checkedIn?"⏸":"▶"}
                </button>
                <button className="icon-btn" style={{color:"#f87171"}}
                  onClick={()=>removePlayer(p.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── COURTS ───────────────────────────────────────────────────────────────────
  const ViewCourts = () => {
    const [sel, setSel] = useState({ A:[], B:[] });
    const [sType, setSType] = useState(state.session.type);
    const [matchDuration, setMatchDuration] = useState((state.settings && state.settings.gameDuration) || 15);
    const available = checkedIn.filter(p =>
      !state.courts.some(c => c.match && [...c.match.teamA,...c.match.teamB].includes(p.id)) &&
      !state.queue.some(q => [...(q.teamA||[]),...(q.teamB||[])].includes(p.id)) &&
      !(p.sitOutGames > 0)
    );
    // Players sitting out (penalty)
    const sittingOut = checkedIn.filter(p => p.sitOutGames > 0);

    const toggleSel = (side, pid) => {
      setSel(s => {
        const list = s[side];
        if (list.includes(pid)) return {...s,[side]:list.filter(x=>x!==pid)};
        if (list.length >= 2) return s;
        return {...s,[side]:[...list,pid]};
      });
    };

    const canAssign = sel.A.length===2 && sel.B.length===2;
    const freeCourt = state.courts.find(c=>!c.match);

    const assign = () => {
      if (!canAssign) { toast$("Select 2 players per team","err"); return; }
      if (freeCourt) { startMatch(freeCourt.id, sel.A, sel.B, sType, matchDuration); setSel({A:[],B:[]}); toast$(`🏸 Match started on ${freeCourt.name}`); }
      else { queueMatch(sel.A, sel.B, sType); setSel({A:[],B:[]}); }
    };

    return (
      <div className="view">
        {/* Active courts */}
        {state.courts.map(court=>{
          const m = court.match;
          if (!m) return (
            <div key={court.id} className="card court-open-card">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span className="court-label" style={{color:"#1aff7a"}}>{court.name}</span>
                <span className="badge" style={{background:"#1aff7a",color:"#050d0a"}}>OPEN</span>
              </div>
              <div style={{color:"#1a4a2a",fontSize:12,marginTop:6}}>Waiting for match assignment</div>
            </div>
          );
          const isPaused = m.status === "paused";
          const mDur = m.duration || GAME_DURATION;
          const s = isPaused ? "paused" : (matchMins(m)>=mDur?"overtime":"playing");
          const col = {paused:"#a78bfa",playing:"#facc15",overtime:"#f87171"}[s];
          const elapsed = matchMins(m);
          const elapsedSecs = matchSecs(m);
          const remaining = Math.max(0, mDur - elapsed);
          const remainSecs = Math.max(0, mDur*60 - elapsedSecs);
          const statusLabel = {paused:"PAUSED",playing:"IN GAME",overtime:"OVERTIME"}[s];
          return (
            <div key={court.id} className="card" style={{borderColor:col+"44"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span className="court-label" style={{color:col}}>{court.name}</span>
                  <span className="badge" style={{background:col,color:"#050d0a",animation:s==="overtime"?"blink 1s infinite":"none"}}>
                    {statusLabel}
                  </span>
                  <span className="badge" style={{background:"#1e293b",color:"#94a3b8"}}>{m.sessionType}</span>
                </div>
                {/* Live timer */}
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:28,fontWeight:900,color:s==="overtime"?"#f87171":s==="paused"?"#a78bfa":"#e2e8f0",lineHeight:1,fontFamily:"'DM Mono',monospace"}}>
                    {s==="overtime"
                      ? `+${elapsed-mDur}m`
                      : fmtElapsed(remainSecs)}
                  </div>
                  <div style={{fontSize:9,color:"#475569",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>
                    {s==="overtime"?"over time":s==="paused"?"paused":"remaining"}
                  </div>
                </div>
              </div>

              <div className="vs-layout">
                <div className="team-col">
                  {m.teamA.map(pid=>{const p=playerById(pid); return p?(
                    <div key={pid} className="player-mini">
                      <div className="av-sm" style={{background:SKILL_COLOR[p.skill]+"22",borderColor:SKILL_COLOR[p.skill]+"44",color:SKILL_COLOR[p.skill]}}>{p.name[0]}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:15}}>{p.name}</div>
                        <div style={{fontSize:10,color:SKILL_COLOR[p.skill]}}>{SKILL_SHORT[p.skill]}</div>
                      </div>
                    </div>
                  ):null;})}
                </div>
                <div className="vs-badge">VS</div>
                <div className="team-col">
                  {m.teamB.map(pid=>{const p=playerById(pid); return p?(
                    <div key={pid} className="player-mini">
                      <div className="av-sm" style={{background:SKILL_COLOR[p.skill]+"22",borderColor:SKILL_COLOR[p.skill]+"44",color:SKILL_COLOR[p.skill]}}>{p.name[0]}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:15}}>{p.name}</div>
                        <div style={{fontSize:10,color:SKILL_COLOR[p.skill]}}>{SKILL_SHORT[p.skill]}</div>
                      </div>
                    </div>
                  ):null;})}
                </div>
              </div>

              <div style={{fontSize:11,color:"#475569",margin:"8px 0 12px"}}>
                Started {fmt(m.startTime)} · {elapsed}m played
                {isPaused && <span style={{color:"#a78bfa",marginLeft:6}}>· Timer paused</span>}
              </div>

              {/* ── LIVE SCOREBOARD ── */}
              <div style={{background:"#070d0f",border:"1.5px solid #1a2f3a",borderRadius:14,padding:"14px 10px",marginBottom:12}}>
                <div style={{fontSize:9,letterSpacing:3,color:"#475569",textTransform:"uppercase",textAlign:"center",marginBottom:10,fontWeight:700}}>
                  Live Score · First to 21
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}}>
                  {/* Team A */}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {m.teamA.map(id=>playerById(id)?.name||"?").join(" & ")}
                    </div>
                    <div style={{fontSize:52,fontWeight:900,lineHeight:1,color:(m.liveScoreA||0)>=21?"#1aff7a":"#e2e8f0",
                      textShadow:(m.liveScoreA||0)>=21?"0 0 20px #1aff7a66":"none",
                      fontFamily:"'DM Mono',monospace"}}>
                      {m.liveScoreA||0}
                    </div>
                    <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:10}}>
                      <button onClick={()=>updateLiveScore(court.id,"A",-1)}
                        style={{width:44,height:44,borderRadius:10,background:"#1a2f3a",border:"1px solid #334155",
                          color:"#f87171",fontSize:22,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <button onClick={()=>updateLiveScore(court.id,"A",1)}
                        style={{width:44,height:44,borderRadius:10,background:"#1aff7a22",border:"1.5px solid #1aff7a44",
                          color:"#1aff7a",fontSize:22,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                  {/* VS divider */}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <div style={{fontSize:12,fontWeight:900,color:"#334155",letterSpacing:2}}>VS</div>
                    <button onClick={()=>resetLiveScore(court.id)}
                      style={{width:32,height:32,borderRadius:8,background:"#1a2f3a",border:"1px solid #334155",
                        color:"#475569",fontSize:10,fontWeight:700,letterSpacing:1,display:"flex",
                        alignItems:"center",justifyContent:"center"}} title="Reset score">↺</button>
                  </div>
                  {/* Team B */}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {m.teamB.map(id=>playerById(id)?.name||"?").join(" & ")}
                    </div>
                    <div style={{fontSize:52,fontWeight:900,lineHeight:1,color:(m.liveScoreB||0)>=21?"#1aff7a":"#e2e8f0",
                      textShadow:(m.liveScoreB||0)>=21?"0 0 20px #1aff7a66":"none",
                      fontFamily:"'DM Mono',monospace"}}>
                      {m.liveScoreB||0}
                    </div>
                    <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:10}}>
                      <button onClick={()=>updateLiveScore(court.id,"B",-1)}
                        style={{width:44,height:44,borderRadius:10,background:"#1a2f3a",border:"1px solid #334155",
                          color:"#f87171",fontSize:22,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <button onClick={()=>updateLiveScore(court.id,"B",1)}
                        style={{width:44,height:44,borderRadius:10,background:"#1aff7a22",border:"1.5px solid #1aff7a44",
                          color:"#1aff7a",fontSize:22,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                </div>
                {/* Winner celebration */}
                {((m.liveScoreA||0)>=21 || (m.liveScoreB||0)>=21) && (
                  <div style={{marginTop:12,padding:"10px",background:"#1aff7a12",border:"1px solid #1aff7a30",
                    borderRadius:10,textAlign:"center",fontSize:13,fontWeight:800,color:"#1aff7a",letterSpacing:1}}>
                    🏆 {(m.liveScoreA||0)>=(m.liveScoreB||0)
                      ? m.teamA.map(id=>playerById(id)?.name||"?").join(" & ")
                      : m.teamB.map(id=>playerById(id)?.name||"?").join(" & ")} wins!
                  </div>
                )}
              </div>

              {/* ── Control buttons ── */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {/* Pause / Resume */}
                {isPaused ? (
                  <button
                    onClick={()=>resumeMatch(court.id)}
                    style={{minHeight:52,background:"#a78bfa22",border:"1.5px solid #a78bfa88",borderRadius:12,
                      color:"#a78bfa",fontFamily:"inherit",fontWeight:800,fontSize:13,letterSpacing:2,
                      display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    ▶ Resume
                  </button>
                ) : (
                  <button
                    onClick={()=>pauseMatch(court.id)}
                    style={{minHeight:52,background:"#facc1510",border:"1.5px solid #facc1544",borderRadius:12,
                      color:"#facc15",fontFamily:"inherit",fontWeight:800,fontSize:13,letterSpacing:2,
                      display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    ⏸ Pause
                  </button>
                )}
                {/* Record Result */}
                <button
                  onClick={()=>setModal({type:"endMatch",courtId:court.id,match:m})}
                  style={{minHeight:52,background:"#f8717110",border:"1.5px solid #f8717144",borderRadius:12,
                    color:"#f87171",fontFamily:"inherit",fontWeight:800,fontSize:13,letterSpacing:2,
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  ⏹ End Game
                </button>
              </div>
            </div>
          );
        })}

        {/* Assign new match */}
        <div className="card">
          <div className="card-title">Assign Match</div>
          <div className="pill-row mb10">
            {SESSION_TYPES.map(t=>(
              <button key={t} className={`pill ${sType===t?"pill-active":""}`} onClick={()=>setSType(t)}>
                {t}
              </button>
            ))}
          </div>

          {/* Timer picker */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>⏱ Game Timer</div>
            <div className="pill-row">
              {TIMER_OPTIONS.map(t=>(
                <button key={t} className={`pill ${matchDuration===t?"pill-active":""}`} onClick={()=>setMatchDuration(t)}>
                  {t} min
                </button>
              ))}
            </div>
          </div>

          {/* Sitting-out players */}
          {sittingOut.length > 0 && (
            <div style={{background:"#facc1508",border:"1px solid #facc1530",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
              <div style={{fontSize:11,color:"#facc15",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>⚠ Sitting Out (Penalty)</div>
              {sittingOut.map(p=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a2f3a"}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#e2e8f0"}}>{p.name}</span>
                  <span style={{fontSize:11,color:"#facc15"}}>{p.sitOutGames} game{p.sitOutGames>1?"s":""} remaining</span>
                </div>
              ))}
            </div>
          )}

          {available.length < 4 && (
            <div className="warn-box">Need at least 4 available checked-in players</div>
          )}

          <div className="team-assign-grid">
            {["A","B"].map(side=>(
              <div key={side} className="team-assign-col">
                <div className="team-assign-header">
                  Team {side}
                  <span style={{fontSize:11,color:"#475569"}}>{sel[side].length}/2</span>
                </div>
                {available.map(p=>(
                  <button key={p.id}
                    className={`player-select-btn ${sel[side].includes(p.id)?"selected":""}
                      ${(sel[side].length===2 && !sel[side].includes(p.id)) || Object.values(sel).flat().filter(x=>x!==undefined).includes(p.id) && !sel[side].includes(p.id)?"disabled":""}`}
                    style={sel[side].includes(p.id)?{borderColor:SKILL_COLOR[p.skill],background:SKILL_COLOR[p.skill]+"18"}:{}}
                    onClick={()=>{
                      const otherSide = side==="A"?"B":"A";
                      if (sel[otherSide].includes(p.id)) return;
                      toggleSel(side,p.id);
                    }}>
                    <span className="av-xs" style={{background:SKILL_COLOR[p.skill]+"22",color:SKILL_COLOR[p.skill]}}>{p.name[0]}</span>
                    <span style={{flex:1,textAlign:"left",fontSize:14,fontWeight:600}}>{p.name}</span>
                    <span style={{fontSize:10,color:SKILL_COLOR[p.skill]}}>{SKILL_SHORT[p.skill]}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>

          <button className={`btn-green mt12 ${!canAssign?"btn-disabled":""}`} onClick={assign}>
            {freeCourt ? `▶ Start on ${freeCourt.name}` : "➕ Add to Queue"}
          </button>
        </div>

        {/* Queue */}
        {state.queue.length > 0 && (
          <div className="card">
            <div className="card-title">Queue · ~{state.queue.length * GAME_DURATION}min wait</div>
            {state.queue.map((q,i)=>(
              <div key={i} className="queue-row-full">
                <span className="q-num">{i+1}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{(q.teamA||[]).map(id=>playerById(id)?.name||"?").join(" & ")} <span style={{color:"#475569"}}>vs</span> {(q.teamB||[]).map(id=>playerById(id)?.name||"?").join(" & ")}</div>
                  <div style={{fontSize:11,color:"#475569"}}>{q.sessionType}{q.skipped>0&&<span style={{color:"#facc15",marginLeft:6}}>↩ skipped ×{q.skipped}</span>}</div>
                </div>
                <button className="icon-btn" style={{color:"#facc15",fontSize:11,padding:"4px 8px",border:"1px solid #facc1544",borderRadius:8,marginRight:4}}
                  onClick={()=>skipQueueTurn(i)} title="Skip — penalty: sit out 1 game">↩ Skip</button>
                <button className="icon-btn" style={{color:"#f87171"}}
                  onClick={()=>update(s=>{ s.queue.splice(i,1); })}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // ── TOURNAMENT ───────────────────────────────────────────────────────────────
  const ViewTournament = () => {
    const [subView, setSubView]   = useState("teams"); // teams | bracket
    const [teamName, setTeamName] = useState("");
    const [leaderId, setLeaderId] = useState("");
    const [teamColor, setTeamColor] = useState(TEAM_COLORS[0]);
    const [expandedTeam, setExpandedTeam] = useState(null);
    const [scoreModal, setScoreModal]     = useState(null); // {roundIdx,matchIdx}
    const [sA, setSA] = useState("21");
    const [sB, setSB] = useState("15");

    const t = state.tournament;
    const teams = state.tournamentTeams;
    const registered = teams.filter(t=>t.registered);
    const unassigned = state.players.filter(p =>
      !teams.some(t => t.memberIds.includes(p.id))
    );

    const teamById = id => teams.find(t=>t.id===id);

    return (
      <div className="view">

        {/* Sub-nav */}
        <div style={{display:"flex",background:"#0d1a20",borderRadius:12,padding:3,border:"1px solid #1a2f3a",gap:3}}>
          {[{id:"teams",icon:"👥",label:"Teams"},{id:"bracket",icon:"🏆",label:"Bracket"}].map(s=>(
            <button key={s.id} onClick={()=>setSubView(s.id)} style={{
              flex:1, minHeight:42, borderRadius:9,
              background:subView===s.id?"#38bdf8":"transparent",
              color:subView===s.id?"#070d0f":"#475569",
              fontWeight:800, fontSize:13, letterSpacing:1,
              display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            }}>{s.icon} {s.label}</button>
          ))}
        </div>

        {/* ── TEAMS TAB ── */}
        {subView === "teams" && (<>

          {/* Create team */}
          <div className="card">
            <div className="card-title">Create Team</div>

            <input className="txt-input" placeholder="Team name (e.g. Thunder Hawks)"
              value={teamName} onChange={e=>setTeamName(e.target.value)}
              onKeyDown={e=>e.key==="Enter" && (addTournamentTeam(teamName,leaderId||null,teamColor), setTeamName(""), setLeaderId(""))}
            />

            {/* Team leader selector */}
            <div style={{marginTop:10}}>
              <div style={{fontSize:10,color:"#475569",letterSpacing:3,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>Team Leader (optional)</div>
              <select className="txt-input" value={leaderId} onChange={e=>setLeaderId(e.target.value)}
                style={{color:leaderId?"#e2e8f0":"#1e3a4a"}}>
                <option value="">— Select a player —</option>
                {state.players.map(p=>(
                  <option key={p.id} value={p.id}>{p.name} ({p.skill})</option>
                ))}
              </select>
            </div>

            {/* Color picker */}
            <div style={{marginTop:10}}>
              <div style={{fontSize:10,color:"#475569",letterSpacing:3,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>Team Colour</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {TEAM_COLORS.map(c=>(
                  <button key={c} onClick={()=>setTeamColor(c)} style={{
                    width:32,height:32,borderRadius:"50%",background:c,
                    border:`3px solid ${teamColor===c?"#fff":"transparent"}`,
                    boxShadow:teamColor===c?`0 0 0 2px ${c}`:"none",
                  }}/>
                ))}
              </div>
            </div>

            <button className="btn-green mt10"
              onClick={()=>{ addTournamentTeam(teamName,leaderId||null,teamColor); setTeamName(""); setLeaderId(""); }}>
              + Create Team
            </button>
          </div>

          {/* Unassigned players warning */}
          {unassigned.length > 0 && (
            <div className="warn-box" style={{borderColor:"#38bdf844",background:"#38bdf808",color:"#38bdf8"}}>
              📋 {unassigned.length} player{unassigned.length!==1?"s":""} not yet assigned to a team:&nbsp;
              {unassigned.map(p=>p.name).join(", ")}
            </div>
          )}

          {/* Team list */}
          {teams.length === 0 && <div className="empty-hint">No teams yet — create one above</div>}

          {teams.map(team => {
            const leader = team.leaderId ? state.players.find(p=>p.id===team.leaderId) : null;
            const members = team.memberIds.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
            const isExpanded = expandedTeam === team.id;

            return (
              <div key={team.id} className="card" style={{borderColor:team.color+"44",padding:0,overflow:"hidden"}}>
                {/* Team header */}
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
                  background:team.color+"08",borderBottom:isExpanded?"1px solid "+team.color+"22":"none"}}>
                  {/* Color dot */}
                  <div style={{width:40,height:40,borderRadius:12,background:team.color+"22",
                    border:"2px solid "+team.color,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:18,fontWeight:900,color:team.color,flexShrink:0}}>
                    {team.name[0].toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:16,color:team.color}}>{team.name}</div>
                    <div style={{fontSize:11,color:"#475569",marginTop:2}}>
                      {leader ? `👑 ${leader.name}` : "No leader"} · {members.length} player{members.length!==1?"s":""}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    {/* Registered badge */}
                    <button onClick={()=>toggleTeamRegistered(team.id)} style={{
                      padding:"5px 10px",borderRadius:100,border:"1.5px solid",
                      fontSize:10,fontWeight:800,letterSpacing:1,textTransform:"uppercase",
                      background:team.registered?team.color+"22":"transparent",
                      borderColor:team.registered?team.color:"#1a2f3a",
                      color:team.registered?team.color:"#475569",
                    }}>{team.registered?"✓ IN":"+ REG"}</button>
                    <button onClick={()=>setExpandedTeam(isExpanded?null:team.id)} className="icon-btn"
                      style={{color:"#475569",fontSize:16}}>{isExpanded?"▲":"▼"}</button>
                    <button onClick={()=>removeTournamentTeam(team.id)} className="icon-btn"
                      style={{color:"#f87171"}}>✕</button>
                  </div>
                </div>

                {/* Expanded: manage members */}
                {isExpanded && (
                  <div style={{padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#475569",letterSpacing:3,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>
                      Players — tap to add/remove
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {state.players.map(p => {
                        const isMember = team.memberIds.includes(p.id);
                        const isLeader = team.leaderId === p.id;
                        const inOtherTeam = !isMember && teams.some(t=>t.id!==team.id && t.memberIds.includes(p.id));
                        return (
                          <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,
                            padding:"8px 10px",borderRadius:10,
                            background:isMember?team.color+"12":"#0f1f28",
                            border:"1.5px solid "+(isMember?team.color+"44":"#1a2f3a"),
                            opacity:inOtherTeam?0.35:1}}>
                            <div className="av-xs" style={{background:SKILL_COLOR[p.skill]+"22",color:SKILL_COLOR[p.skill]}}>{p.name[0]}</div>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:700,fontSize:14}}>{p.name}
                                {isLeader && <span style={{marginLeft:6,fontSize:10,color:"#facc15"}}>👑 Leader</span>}
                                {inOtherTeam && <span style={{marginLeft:6,fontSize:10,color:"#f87171"}}>Other team</span>}
                              </div>
                              <div style={{fontSize:10,color:SKILL_COLOR[p.skill]}}>{p.skill}</div>
                            </div>
                            <div style={{display:"flex",gap:6}}>
                              {isMember && !isLeader && (
                                <button onClick={()=>setTeamLeader(team.id,p.id)}
                                  style={{padding:"4px 8px",borderRadius:6,background:"#facc1518",
                                    border:"1px solid #facc1544",color:"#facc15",fontSize:10,fontWeight:800}}>
                                  👑 Lead
                                </button>
                              )}
                              {!inOtherTeam && (
                                <button onClick={()=>toggleTeamMember(team.id,p.id)}
                                  className="icon-btn"
                                  style={{color:isMember?"#f87171":"#1aff7a",background:isMember?"#f8717118":"#1aff7a18"}}>
                                  {isMember?"−":"+"}
                                </button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Start tournament CTA */}
          {registered.length >= 2 && !t && (
            <button className="btn-green" style={{background:"linear-gradient(135deg,#facc15,#f59e0b)",color:"#070d0f"}}
              onClick={startTournament}>
              🏆 Generate Bracket ({registered.length} Teams)
            </button>
          )}
          {registered.length < 2 && teams.length > 0 && (
            <div className="warn-box">Register at least 2 teams to generate the bracket</div>
          )}
        </>)}

        {/* ── BRACKET TAB ── */}
        {subView === "bracket" && (<>
          {!t ? (
            <div className="card" style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:48,marginBottom:16}}>🏆</div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>No Bracket Yet</div>
              <div style={{fontSize:13,color:"#475569",marginBottom:20}}>
                Register your teams first, then generate the bracket.
              </div>
              <button className="btn-green" onClick={()=>setSubView("teams")}>← Manage Teams</button>
            </div>
          ) : (<>

            {/* Champion banner */}
            {t.champion && (
              <div className="card champion-card" style={{borderColor:(teamById(t.champion.id)?.color||"#facc15")+"55"}}>
                <div style={{fontSize:44,marginBottom:8}}>🏆</div>
                <div style={{fontSize:10,letterSpacing:4,color:"#facc15",textTransform:"uppercase",marginBottom:6}}>Tournament Champion</div>
                <div style={{fontSize:26,fontWeight:900,color:teamById(t.champion.id)?.color||"#facc15"}}>
                  {t.champion.name}
                </div>
                {(() => {
                  const ct = teamById(t.champion.id);
                  const leader = ct?.leaderId ? state.players.find(p=>p.id===ct.leaderId) : null;
                  const members = ct?.memberIds.map(id=>state.players.find(p=>p.id===id)).filter(Boolean)||[];
                  return leader || members.length ? (
                    <div style={{marginTop:10,fontSize:12,color:"#94a3b8"}}>
                      {leader && <span>👑 {leader.name} &nbsp;</span>}
                      {members.filter(m=>m.id!==ct?.leaderId).map(m=>m.name).join(", ")}
                    </div>
                  ) : null;
                })()}
              </div>
            )}

            {/* Rounds */}
            {t.rounds.map((round, ri)=>(
              <div key={ri} className="card">
                <div className="card-title">{roundLabel(t.rounds, ri)}</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {round.map((match, mi)=>{
                    const tcA = teamById(match.teamA?.id);
                    const tcB = match.teamB ? teamById(match.teamB.id) : null;
                    const isBye = match.teamB === null;

                    return (
                      <div key={match.id} className="bracket-match">

                        {/* Team A */}
                        <div className={`bracket-team ${match.winner?.id===match.teamA?.id?"bracket-winner":""} ${isBye?"bracket-bye":""}`}
                          style={match.winner?.id===match.teamA?.id?{borderColor:(tcA?.color||"#facc15"),background:(tcA?.color||"#facc15")+"10"}:{}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                            {tcA && <div style={{width:24,height:24,borderRadius:6,background:tcA.color+"22",border:"1.5px solid "+tcA.color,
                              display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:tcA.color,flexShrink:0}}>
                              {tcA.name[0]}
                            </div>}
                            <span style={{fontWeight:700,fontSize:15}}>{match.teamA?.name||"TBD"}</span>
                            {(() => { const tl=teamById(match.teamA?.id); const lead=tl?.leaderId?state.players.find(p=>p.id===tl.leaderId):null;
                              return lead?<span style={{fontSize:10,color:"#facc15"}}>· 👑{lead.name}</span>:null; })()}
                          </div>
                          {match.winner?.id===match.teamA?.id && <span style={{fontSize:18}}>👑</span>}
                          {match.scoreA && <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:900,
                            color:match.winner?.id===match.teamA?.id?"#1aff7a":"#475569",marginLeft:8}}>{match.scoreA}</span>}
                        </div>

                        <div className="bracket-vs">{isBye ? "BYE" : "VS"}</div>

                        {/* Team B */}
                        {!isBye && (
                          <div className={`bracket-team ${match.winner?.id===match.teamB?.id?"bracket-winner":""}`}
                            style={match.winner?.id===match.teamB?.id?{borderColor:(tcB?.color||"#facc15"),background:(tcB?.color||"#facc15")+"10"}:{}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                              {tcB && <div style={{width:24,height:24,borderRadius:6,background:tcB.color+"22",border:"1.5px solid "+tcB.color,
                                display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:tcB.color,flexShrink:0}}>
                                {tcB.name[0]}
                              </div>}
                              <span style={{fontWeight:700,fontSize:15}}>{match.teamB?.name||"TBD"}</span>
                              {(() => { const tl=teamById(match.teamB?.id); const lead=tl?.leaderId?state.players.find(p=>p.id===tl.leaderId):null;
                                return lead?<span style={{fontSize:10,color:"#facc15"}}>· 👑{lead.name}</span>:null; })()}
                            </div>
                            {match.winner?.id===match.teamB?.id && <span style={{fontSize:18}}>👑</span>}
                            {match.scoreB && <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:900,
                              color:match.winner?.id===match.teamB?.id?"#1aff7a":"#475569",marginLeft:8}}>{match.scoreB}</span>}
                          </div>
                        )}

                        {/* Record result button */}
                        {!match.winner && !isBye && (
                          <button onClick={()=>{ setScoreModal({roundIdx:ri,matchIdx:mi,match}); setSA("21"); setSB("15"); }}
                            style={{padding:"8px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,
                              color:"#94a3b8",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>
                            Record Result
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}

            <button className="btn-outline mt4" style={{borderColor:"#f87171",color:"#f87171"}}
              onClick={()=>{ update(s=>{ s.tournament=null; }); }}>
              Reset Bracket
            </button>
          </>)}
        </>)}

        {/* Score entry modal */}
        {scoreModal && (
          <div className="overlay">
            <div className="sheet">
              <div className="sheet-handle"/>
              <div className="sheet-title">Record Match Result</div>
              <div style={{fontSize:11,color:"#475569",textAlign:"center",marginBottom:16,letterSpacing:1}}>
                {roundLabel(t?.rounds||[], scoreModal.roundIdx).toUpperCase()}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
                <div style={{flex:1,textAlign:"center"}}>
                  {(() => { const tc=teamById(scoreModal.match.teamA?.id); return (
                    <div style={{fontSize:13,fontWeight:800,marginBottom:6,color:tc?.color||"#e2e8f0"}}>{scoreModal.match.teamA?.name}</div>
                  ); })()}
                  <input className="score-input" value={sA} onChange={e=>setSA(e.target.value)} type="number" min="0"/>
                </div>
                <div style={{color:"#475569",fontSize:20,fontWeight:900}}>–</div>
                <div style={{flex:1,textAlign:"center"}}>
                  {(() => { const tc=teamById(scoreModal.match.teamB?.id); return (
                    <div style={{fontSize:13,fontWeight:800,marginBottom:6,color:tc?.color||"#e2e8f0"}}>{scoreModal.match.teamB?.name}</div>
                  ); })()}
                  <input className="score-input" value={sB} onChange={e=>setSB(e.target.value)} type="number" min="0"/>
                </div>
              </div>
              <div style={{fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Winner</div>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                {[{side:"A",team:scoreModal.match.teamA},{side:"B",team:scoreModal.match.teamB}].map(({side,team})=>{
                  const tc=teamById(team?.id);
                  return (
                    <button key={side} onClick={()=>{
                      recordTournamentResult(scoreModal.roundIdx,scoreModal.matchIdx,side,sA,sB);
                      setScoreModal(null);
                    }} style={{flex:1,minHeight:52,borderRadius:12,
                      border:"1.5px solid "+(tc?.color||"#1a2f3a"),
                      background:(tc?.color||"#38bdf8")+"18",
                      color:tc?.color||"#e2e8f0",fontWeight:800,fontSize:14,
                      display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                      {tc && <div style={{width:20,height:20,borderRadius:4,background:tc.color+"33",border:"1.5px solid "+tc.color,fontSize:10,fontWeight:900,color:tc.color,display:"flex",alignItems:"center",justifyContent:"center"}}>{tc.name[0]}</div>}
                      {team?.name} 👑
                    </button>
                  );
                })}
              </div>
              <button className="btn-cancel-sheet" onClick={()=>setScoreModal(null)}>Cancel</button>
            </div>
          </div>
        )}

      </div>
    );
  };

  // ── LEADERBOARD ──────────────────────────────────────────────────────────────
  const ViewLeaderboard = () => {
    const sorted = [...state.players]
      .filter(p=>p.gamesPlayed>0)
      .sort((a,b)=> b.wins!==a.wins ? b.wins-a.wins : a.losses-b.losses);

    return (
      <div className="view">
        <div className="card">
          <div className="card-title">🏅 Leaderboard</div>
          {sorted.length === 0 && <div className="empty-hint">No matches played yet</div>}
          {sorted.map((p,i)=>(
            <div key={p.id} className="lb-row">
              <div className="lb-rank" style={{color:["#facc15","#94a3b8","#cd7c2f","#475569"][Math.min(i,3)]}}>
                {["🥇","🥈","🥉"][i] || `#${i+1}`}
              </div>
              <div className="av-sm" style={{background:SKILL_COLOR[p.skill]+"22",borderColor:SKILL_COLOR[p.skill]+"44",color:SKILL_COLOR[p.skill]}}>
                {p.name[0]}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16}}>{p.name}</div>
                <div style={{fontSize:11,color:SKILL_COLOR[p.skill]}}>{p.skill}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:900,fontSize:18,color:"#1aff7a"}}>{p.wins}W</div>
                <div style={{fontSize:11,color:"#475569"}}>{p.gamesPlayed} games · {p.losses}L</div>
              </div>
              <div style={{width:40,textAlign:"center"}}>
                <div style={{fontSize:12,fontWeight:800,color:"#38bdf8"}}>
                  {p.gamesPlayed>0?Math.round(p.wins/p.gamesPlayed*100):0}%
                </div>
                <div style={{fontSize:9,color:"#475569"}}>WIN</div>
              </div>
            </div>
          ))}
        </div>

        {/* Per-session type stats */}
        {["Friendly","Open","Tournament"].map(type=>{
          const typeMatches = state.matches.filter(m=>m.sessionType===type);
          if (typeMatches.length===0) return null;
          return (
            <div key={type} className="card">
              <div className="card-title">{type} — {typeMatches.length} matches</div>
              {typeMatches.slice(-4).reverse().map(m=>(
                <div key={m.id} className="match-mini">
                  <div className="match-teams">
                    <span className="winner-team">{m.winner.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                    <span className="match-score">{m.scoreA} – {m.scoreB}</span>
                    <span className="loser-team">{m.loser.map(id=>playerById(id)?.name||"?").join(" & ")}</span>
                  </div>
                  <div className="match-meta">{fmt(m.startTime)}</div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  };

  // ── END MATCH MODAL ──────────────────────────────────────────────────────────
  const ModalEndMatch = () => {
    if (!modal || modal.type !== "endMatch") return null;
    const m = modal.match;
    const [sA, setSA] = useState("21");
    const [sB, setSB] = useState("15");
    const [winner, setWinner] = useState(null);
    const teamANames = m.teamA.map(id=>playerById(id)?.name||"?").join(" & ");
    const teamBNames = m.teamB.map(id=>playerById(id)?.name||"?").join(" & ");

    return (
      <div className="overlay">
        <div className="sheet">
          <div className="sheet-handle"/>
          <div className="sheet-title">Record Result</div>
          <div style={{fontSize:11,color:"#475569",textAlign:"center",marginBottom:16,letterSpacing:1}}>{m.sessionType.toUpperCase()}</div>

          {/* Score inputs */}
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:"#e2e8f0"}}>{teamANames}</div>
              <input className="score-input" value={sA} onChange={e=>setSA(e.target.value)} type="number" min="0"/>
            </div>
            <div style={{color:"#475569",fontSize:20,fontWeight:900}}>–</div>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:"#e2e8f0"}}>{teamBNames}</div>
              <input className="score-input" value={sB} onChange={e=>setSB(e.target.value)} type="number" min="0"/>
            </div>
          </div>

          {/* Winner select */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"#475569",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Winner</div>
            <div style={{display:"flex",gap:8}}>
              <button className={`winner-btn ${winner==="A"?"winner-active":""}`} onClick={()=>setWinner("A")}>
                {teamANames}
              </button>
              <button className={`winner-btn ${winner==="B"?"winner-active":""}`} onClick={()=>setWinner("B")}>
                {teamBNames}
              </button>
            </div>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button className="btn-cancel-sheet" onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn-green" style={{flex:1,opacity:winner?1:.4}}
              onClick={()=>{ if(!winner){toast$("Select a winner","err");return;} endMatch(modal.courtId,winner,sA,sB); setModal(null); }}>
              ✓ Save Result
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ─── NAV ─────────────────────────────────────────────────────────────────────

  // ── SETUP VIEW ────────────────────────────────────────────────────────────────
  // ── ADMIN VIEW ────────────────────────────────────────────────────────────────
  const ViewAdmin = () => {
    const adminPin = (state.settings && state.settings.adminPin) || "1234";
    const sessionFee = (state.settings && state.settings.sessionFee) || 5;

    if (!adminUnlocked) {
      return (
        <div className="view" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
          <div className="card" style={{maxWidth:320,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🔐</div>
            <div className="card-title">Admin Access</div>
            <div style={{fontSize:13,color:"#475569",marginBottom:16}}>Enter PIN to access admin panel</div>
            <input className="txt-input" type="password" placeholder="Enter PIN"
              value={adminPinInput} onChange={e=>setAdminPinInput(e.target.value)}
              onKeyDown={e=>{
                if(e.key==="Enter"){
                  if(adminPinInput === adminPin){ setAdminUnlocked(true); setAdminPinInput(""); toast$("✓ Admin unlocked"); }
                  else { toast$("Wrong PIN","err"); setAdminPinInput(""); }
                }
              }}
              style={{textAlign:"center",fontSize:20,letterSpacing:8,marginBottom:12}}
            />
            <button className="btn-green" onClick={()=>{
              if(adminPinInput === adminPin){ setAdminUnlocked(true); setAdminPinInput(""); toast$("✓ Admin unlocked"); }
              else { toast$("Wrong PIN","err"); setAdminPinInput(""); }
            }}>Unlock</button>
          </div>
        </div>
      );
    }

    const totalPlayers = state.players.length;
    const paidPlayers  = state.players.filter(p=>p.hasPaid);
    const unpaidPlayers = state.players.filter(p=>!p.hasPaid && p.checkedIn);
    const totalRevenue = paidPlayers.reduce((sum,p)=>sum+(p.amountPaid||0),0);
    const expectedRevenue = totalPlayers * sessionFee;

    return (
      <div className="view">
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:18,fontWeight:900,letterSpacing:1}}>Admin Panel</div>
          <button onClick={()=>setAdminUnlocked(false)}
            style={{background:"#1a2f3a",border:"1px solid #334155",borderRadius:8,
              color:"#f87171",padding:"6px 12px",fontSize:12,fontWeight:700}}>🔒 Lock</button>
        </div>

        {/* Revenue Summary */}
        <div className="card" style={{borderColor:"#1aff7a44"}}>
          <div className="card-title">💰 Revenue Summary</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
            {[
              {label:"Collected", value:`$${totalRevenue}`, color:"#1aff7a"},
              {label:"Expected",  value:`$${expectedRevenue}`, color:"#38bdf8"},
              {label:"Unpaid",    value:`$${Math.max(0,expectedRevenue-totalRevenue)}`, color:"#f87171"},
            ].map(s=>(
              <div key={s.label} style={{background:"#0f1f28",borderRadius:10,padding:"12px 8px",textAlign:"center",border:"1px solid #1a2f3a"}}>
                <div style={{fontSize:22,fontWeight:900,color:s.color,lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:10,color:"#475569",marginTop:4,letterSpacing:2,textTransform:"uppercase"}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#475569",padding:"8px 0",borderTop:"1px solid #1a2f3a"}}>
            <span>Session Fee: <span style={{color:"#e2e8f0",fontWeight:700}}>${sessionFee}/player</span></span>
            <span>{paidPlayers.length}/{totalPlayers} paid</span>
          </div>
          {/* Progress bar */}

        <div className="card">
